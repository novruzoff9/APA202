<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sifarişlərim və Çoxlu Məhsul Sifarişi</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 28px;
            color: #1e293b;
            font-weight: 700;
        }

        /* Düymələr */
        .btn {
            background-color: #2563eb;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover { background-color: #1d4ed8; }
        .btn-success { background-color: #10b981; }
        .btn-success:hover { background-color: #059669; }
        .btn-secondary { background-color: #64748b; color: white; }
        .btn-secondary:hover { background-color: #475569; }
        .btn-danger { background-color: #ef4444; padding: 10px; }
        .btn-danger:hover { background-color: #dc2626; }
        
        .btn-outline {
            background: transparent;
            border: 2px dashed #2563eb;
            color: #2563eb;
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
        }
        .btn-outline:hover { background: #eff6ff; }

        /* Sifariş Kartları */
        .order-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        .order-header {
            background: #f8fafc;
            padding: 15px 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .order-title { font-weight: 600; color: #64748b; font-size: 14px; text-transform: uppercase; }
        .order-total { font-size: 18px; font-weight: 700; color: #10b981; }
        .order-items { padding: 10px 20px; }
        
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .item-row:last-child { border-bottom: none; }
        .item-info { display: flex; flex-direction: column; }
        .item-name { font-weight: 600; color: #1e293b; }
        .item-details { font-size: 13px; color: #94a3b8; margin-top: 2px; }
        .item-total-price { font-weight: 600; color: #334155; }

        /* MODAL STYLES */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active .modal { transform: translateY(0); }
        .modal h2 { margin-bottom: 20px; font-size: 22px; color: #1e293b; }
        
        /* Dinamik məhsul sətirləri */
        .product-input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            margin-bottom: 15px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .form-group { flex: 2; }
        .form-group.qty { flex: 1; }
        
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 13px; color: #475569; }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 25px;
            border-top: 1px solid #e2e8f0;
            padding-top: 15px;
        }

        /* Səliqəli Xəta Mesajları */
        .error-msg { 
            background: #fef2f2; 
            color: #ef4444; 
            padding: 15px; 
            border-radius: 8px; 
            text-align: left;
            margin-bottom: 15px;
            border: 1px solid #fca5a5;
            font-size: 14px;
        }
        .error-msg ul {
            margin-left: 20px;
            margin-top: 5px;
        }
        .loading { text-align: center; color: #64748b; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <div id="globalErrorContainer"></div>

        <header>
            <h1>Sifarişlərim</h1>
            <button class="btn btn-success" onclick="openModal()">+ Sifariş Yarat</button>
        </header>

        <div id="ordersContainer">
            <p class="loading">Sifarişlər yüklənir...</p>
        </div>
    </div>

    <div class="modal-overlay" id="orderModal">
        <div class="modal">
            <h2>Yeni Sifariş</h2>
            
            <div id="modalErrorContainer"></div>

            <form id="orderForm">
                <div id="dynamicProductsContainer"></div>

                <button type="button" class="btn btn-outline" onclick="addProductRow()">+ Başqa Məhsul Əlavə Et</button>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Ləğv et</button>
                    <button type="submit" class="btn">Sifarişi Tamamla</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const ordersContainer = document.getElementById("ordersContainer");
        const orderModal = document.getElementById("orderModal");
        const dynamicProductsContainer = document.getElementById("dynamicProductsContainer");
        const orderForm = document.getElementById("orderForm");
        const globalErrorContainer = document.getElementById("globalErrorContainer");
        const modalErrorContainer = document.getElementById("modalErrorContainer");
        
        const token = localStorage.getItem("token");
        let cachedProducts = [];

        // Köməkçi funksiya: Xətaları massivdən oxuyub səliqəli HTML formatına salır
        function generateErrorHtml(errorsArray) {
            if (!errorsArray || errorsArray.length === 0) return "";
            let html = `<div class="error-msg"><strong>Xəta baş verdi:</strong><ul>`;
            errorsArray.forEach(err => {
                html += `<li>${err}</li>`;
            });
            html += `</ul></div>`;
            return html;
        }

        // 1. SİFARİŞLƏRİ GETİRMƏK
        async function loadOrders() {
            globalErrorContainer.innerHTML = "";
            try {
                if(!token) {
                    ordersContainer.innerHTML = "<p class='error-msg'>Giriş edilməyib. Zəhmət olmasa log in olun.</p>";
                    return;
                }

                const response = await axios.get("http://localhost:5023/api/Orders", {
                    headers: { Authorization: `Bearer ${token}` }
                });

                // Diqqət: Datanı response.data.data daxilindən oxuyuruq
                const orders = response.data.data; 
                ordersContainer.innerHTML = ""; 

                if (!orders || orders.length === 0) {
                    ordersContainer.innerHTML = "<p style='text-align:center; color:#64748b;'>Hələ ki heç bir sifarişiniz yoxdur.</p>";
                    return;
                }

                orders.forEach((order, index) => {
                    let itemsHtml = "";
                    order.items.forEach(item => {
                        itemsHtml += `
                            <div class="item-row">
                                <div class="item-info">
                                    <span class="item-name">${item.name}</span>
                                    <span class="item-details">${item.quantity} ədəd × ${item.price.toFixed(2)} AZN</span>
                                </div>
                                <div class="item-total-price">${item.totalPrice.toFixed(2)} AZN</div>
                            </div>
                        `;
                    });

                    ordersContainer.innerHTML += `
                        <div class="order-card">
                            <div class="order-header">
                                <span class="order-title">Sifariş #${index + 1}</span>
                                <span class="order-total">${order.totalPrice.toFixed(2)} AZN</span>
                            </div>
                            <div class="order-items">${itemsHtml}</div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error(error);
                ordersContainer.innerHTML = "";
                // Sənin gətirdiyin model formatında xətaları render edirik
                if (error.response && error.response.data && error.response.data.errors) {
                    globalErrorContainer.innerHTML = generateErrorHtml(error.response.data.errors);
                } else {
                    globalErrorContainer.innerHTML = generateErrorHtml(["Sifarişləri yükləyərkən gözlənilməz xəta baş verdi."]);
                }
            }
        }

        // 2. MƏHSULLARI YÜKLƏMƏK
        async function fetchProducts() {
            if (cachedProducts.length > 0) return; 
            try {
                const response = await axios.get("http://localhost:5023/api/Products");
                // Diqqət: Burada da response.data.data istifadə olunur
                cachedProducts = response.data.data || response.data; 
            } catch (error) {
                console.error("Məhsullar yüklənmədi", error);
            }
        }

        // 3. DİNAMİK SƏTİR ƏLAVƏ ETMƏK
        function addProductRow() {
            const rowId = "row_" + Date.now();
            
            let optionsHtml = '<option value="">-- Məhsul seçin --</option>';
            if(Array.isArray(cachedProducts)) {
                cachedProducts.forEach(p => {
                    optionsHtml += `<option value="${p.id}">${p.name} (${p.price.toFixed(2)} AZN)</option>`;
                });
            }

            const rowHtml = `
                <div class="product-input-row" id="${rowId}">
                    <div class="form-group">
                        <label>Məhsul</label>
                        <select class="form-control product-select" required>
                            ${optionsHtml}
                        </select>
                    </div>
                    <div class="form-group qty">
                        <label>Miqdar</label>
                        <input type="number" class="form-control product-quantity" min="1" value="1" required>
                    </div>
                    <button type="button" class="btn btn-danger" onclick="removeProductRow('${rowId}')">Sil</button>
                </div>
            `;
            
            dynamicProductsContainer.insertAdjacentHTML('beforeend', rowHtml);
        }

        function removeProductRow(rowId) {
            const rows = document.querySelectorAll('.product-input-row');
            if(rows.length > 1) {
                document.getElementById(rowId).remove();
            } else {
                alert("Sifarişdə ən azı 1 məhsul olmalıdır!");
            }
        }

        // 4. MODAL KONTROLU
        async function openModal() {
            modalErrorContainer.innerHTML = ""; // Köhnə xətaları silirik
            orderModal.classList.add("active");
            dynamicProductsContainer.innerHTML = ""; 
            await fetchProducts(); 
            addProductRow(); 
        }

        function closeModal() {
            orderModal.classList.remove("active");
            orderForm.reset();
        }

        // 5. SİFARİŞ YARATMAQ (POST)
        orderForm.addEventListener("submit", async function(e) {
            e.preventDefault();
            modalErrorContainer.innerHTML = ""; // Hər submit-də xətanı sıfırla

            const productRows = document.querySelectorAll('.product-input-row');
            const itemsArray = [];

            productRows.forEach(row => {
                const productId = parseInt(row.querySelector('.product-select').value);
                const quantity = parseInt(row.querySelector('.product-quantity').value);

                if (productId) {
                    itemsArray.push({ productId: productId, quantity: quantity });
                }
            });

            if(itemsArray.length === 0) {
                modalErrorContainer.innerHTML = generateErrorHtml(["Zəhmət olmasa ən azı bir məhsul seçin."]);
                return;
            }

            const body = { items: itemsArray };

            try {
                await axios.post("http://localhost:5023/api/Orders", body, {
                    headers: { 
                        Authorization: `Bearer ${token}`,
                        "Content-Type": "application/json"
                    }
                });

                alert("Sifariş uğurla yaradıldı!");
                closeModal();
                loadOrders();
            } catch (error) {
                console.error(error);
                // Backend-dən gələn ResponseModel xətalarını bura çıxarırıq
                if (error.response && error.response.data && error.response.data.errors) {
                    modalErrorContainer.innerHTML = generateErrorHtml(error.response.data.errors);
                } else {
                    modalErrorContainer.innerHTML = generateErrorHtml(["Sifariş yaradılarkən gözlənilməz bir xəta baş verdi."]);
                }
            }
        });

        loadOrders();
    </script>
</body>
</html>
